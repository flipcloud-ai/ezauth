{{define "admin/audit.html"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{if and .AppName (not .HideAppName)}}{{.AppName}} — {{end}}Admin — Audit Log</title>
  <link rel="icon" type="image/svg+xml" href="{{.LogoURL}}">
  <script src="{{.StaticPrefix}}/vendor/vue.global.prod.js"></script>
  <link rel="stylesheet" href="{{.StaticPrefix}}/vendor/element-plus.css" />
  <script src="{{.StaticPrefix}}/vendor/element-plus.full.min.js"></script>
  <link rel="stylesheet" href="{{.StaticPrefix}}/css/all.min.css" />
  <link rel="stylesheet" href="{{.StaticPrefix}}/css/portal.css">
  <script>const AUTH_PREFIX = "{{.AuthPrefix}}"; const CSRF_TOKEN = "{{.CSRFToken}}"; const PORTAL_USER = "{{.Username}}"; const PORTAL_INITIALS = "{{.UserInitials}}"; const PORTAL_DB_ENABLED = {{.DBEnabled}};</script>
  <script src="{{.StaticPrefix}}/scripts/portal.js"></script>
  <style>
    .filter-bar {
      background:#fff; border-radius:12px; box-shadow:0 2px 8px rgba(61,35,20,.06);
      padding:1rem 1.25rem; display:flex; gap:0.75rem; flex-wrap:wrap;
      align-items:flex-end; margin-bottom:1.25rem;
    }
    .filter-bar .filter-item { display:flex; flex-direction:column; gap:0.375rem; }
    .filter-bar .filter-label { font-size:0.75rem; font-weight:600; color:var(--text-secondary); }
    .filter-bar .el-date-editor { width:280px; }
    .filter-bar .el-select { width:180px; }
    .filter-bar .el-input  { width:200px; }
    .details-cell {
      font-size:0.8rem; color:var(--text-secondary);
      font-family:'SF Mono','Fira Code',monospace;
      max-width:280px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .event-type-badge {
      font-size:0.78rem; font-weight:500; padding:2px 8px; border-radius:4px;
      font-family:'SF Mono','Fira Code',monospace;
    }
    .event-login   { background:#e6f7ff; color:#0958d9; }
    .event-logout  { background:#f6ffed; color:#389e0d; }
    .event-admin   { background:#fff7e6; color:#d46b08; }
    .event-revoke  { background:#fff1f0; color:#cf1322; }
    .event-token   { background:#f9f0ff; color:#722ed1; }
    .event-default { background:#fafafa; color:#595959; }
  </style>
</head>
<body>
<div class="layout">
  {{template "admin/nav.html" .}}
  <div id="app" class="main-area"></div>
</div>

<script type="text/x-template" id="audit-tpl">
  <header class="top-header">
    <div class="breadcrumb">
      <span>Admin</span>
      <i class="fa fa-chevron-right"></i>
      <span class="crumb-active">Audit Log</span>
    </div>
    <div class="header-right" style="position:relative;">
      <div class="header-username" v-text="portalUser"></div>
      <div class="header-avatar" @click.stop="toggleProfile" v-text="portalInitials"></div>
      <div v-if="showProfile" class="profile-popover" @click.stop>
        <div class="profile-popover-user">
          <div class="profile-popover-avatar" v-text="portalInitials"></div>
          <div class="profile-popover-info">
            <div class="profile-popover-name" v-text="portalUser || '—'"></div>
          </div>
        </div>
        <div class="profile-popover-actions">
          <a :href="authPrefix + '/portal/profile'" class="profile-popover-action">
            <i class="fa fa-user"></i> My Profile
          </a>
          <a v-if="dbEnabled" :href="authPrefix + '/portal/tokens'" class="profile-popover-action">
            <i class="fa fa-key"></i> Access Tokens
          </a>
          <a :href="authPrefix + '/logout'" class="profile-popover-action danger">
            <i class="fa fa-right-from-bracket"></i> Sign out
          </a>
        </div>
      </div>
    </div>
  </header>
  <main class="page-content">
    <div class="page-header-row">
      <div class="page-heading">
        <h1>Audit Log</h1>
        <p>Full record of authentication events and administrative actions.</p>
      </div>
      <div style="display:flex;gap:0.5rem;">
        <el-button circle @click="fetchEvents" :loading="loading">
          <i class="fa fa-rotate-right"></i>
        </el-button>
        <el-button class="btn-primary" @click="exportCSV">
          <i class="fa fa-download" style="margin-right:6px;"></i>Export CSV
        </el-button>
      </div>
    </div>

    <div class="filter-bar">
      <div class="filter-item">
        <span class="filter-label">Date Range</span>
        <el-date-picker v-model="dateRange" type="daterange" range-separator="to"
          start-placeholder="Start date" end-placeholder="End date" @change="applyFilters" />
      </div>
      <div class="filter-item">
        <span class="filter-label">Event Type</span>
        <el-select v-model="typeFilter" placeholder="All Types" clearable @change="applyFilters">
          <el-option label="All Types"      value="" />
          <el-option label="login"          value="login" />
          <el-option label="logout"         value="logout" />
          <el-option label="token_refresh"  value="token_refresh" />
          <el-option label="session_revoke" value="session_revoke" />
          <el-option label="admin_action"   value="admin_action" />
        </el-select>
      </div>
      <div class="filter-item">
        <span class="filter-label">User</span>
        <el-input v-model="userSearch" placeholder="Search by user" clearable @input="applyFilters" />
      </div>
      <div class="filter-item">
        <span class="filter-label">Request ID</span>
        <el-input v-model="requestIDSearch" placeholder="Search by request ID" clearable @input="applyFilters" />
      </div>
      <div class="filter-item" style="justify-content:flex-end;">
        <el-button @click="clearFilters" style="color:var(--text-secondary);border-color:var(--border-color);">
          <i class="fa fa-xmark" style="margin-right:4px;"></i>Clear
        </el-button>
      </div>
    </div>

    <div class="section-card" v-loading="loading">
      <el-table :data="pagedEvents" style="width:100%;">
        <el-table-column label="Timestamp" width="170">
          <template #default="scope">
            <span v-text="fmtTime(scope.row.timestamp)"></span>
          </template>
        </el-table-column>
        <el-table-column prop="user" label="User" min-width="180" show-overflow-tooltip />
        <el-table-column label="Event" width="150">
          <template #default="scope">
            <span :class="['event-type-badge', eventClass(scope.row.type)]" v-text="scope.row.type"></span>
          </template>
        </el-table-column>
        <el-table-column prop="ip"       label="IP"       width="130" />
        <el-table-column prop="provider" label="Provider" width="110" show-overflow-tooltip />
        <el-table-column prop="request_id" label="Request ID" width="130" show-overflow-tooltip />
        <el-table-column label="Details" min-width="220">
          <template #default="scope">
            <span class="details-cell" :title="scope.row.details" v-text="scope.row.details"></span>
          </template>
        </el-table-column>
        <el-table-column label="Status" width="100">
          <template #default="scope">
            <el-tag :type="statusTag(scope.row).type" size="small"
              style="border-radius:6px;font-weight:500;" v-text="statusTag(scope.row).label" />
          </template>
        </el-table-column>
      </el-table>
      <div class="pagination-row">
        <el-pagination
          v-model:current-page="currentPage"
          :page-size="pageSize"
          :total="filteredEvents.length"
          layout="total, prev, pager, next"
          @current-change="p => currentPage = p"
        />
      </div>
    </div>
  </main>
</script>

<script>
const { createApp, ref, computed, onMounted } = Vue;
createApp({
  template: '#audit-tpl',
  setup() {
    const portalUser     = ref(PORTAL_USER);
    const portalInitials = ref(PORTAL_INITIALS);
    const authPrefix     = ref(AUTH_PREFIX);
    const dbEnabled      = PORTAL_DB_ENABLED;
    const { showProfile, toggleProfile } = useProfile();

    const allEvents  = ref([]);
    const loading    = ref(false);
    const dateRange       = ref(null);
    const typeFilter      = ref('');
    const userSearch      = ref('');
    const requestIDSearch = ref('');
    const currentPage = ref(1);
    const pageSize    = ref(20);

    async function fetchEvents() {
      loading.value = true;
      try {
        const resp = await fetch(AUTH_PREFIX + '/audit/events?limit=500');
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const data = await resp.json();
        allEvents.value = Array.isArray(data) ? data : [];
      } catch(e) {
        ElementPlus.ElMessage({ message: e.message, type: 'error', plain: true });
      } finally { loading.value = false; }
    }

    const filteredEvents = computed(() => allEvents.value.filter(e => {
      const matchType = !typeFilter.value || e.type === typeFilter.value;
      const matchUser = !userSearch.value || (e.user || '').toLowerCase().includes(userSearch.value.toLowerCase());
      const matchReqID = !requestIDSearch.value || (e.request_id || '').toLowerCase().includes(requestIDSearch.value.toLowerCase());
      if (dateRange.value && dateRange.value[0] && dateRange.value[1]) {
        const t = new Date(e.timestamp);
        if (t < dateRange.value[0] || t > dateRange.value[1]) return false;
      }
      return matchType && matchUser && matchReqID;
    }));
    const pagedEvents = computed(() => {
      const s = (currentPage.value - 1) * pageSize.value;
      return filteredEvents.value.slice(s, s + pageSize.value);
    });

    function applyFilters() { currentPage.value = 1; }
    function clearFilters() { dateRange.value=null; typeFilter.value=''; userSearch.value=''; requestIDSearch.value=''; currentPage.value=1; }

    function eventClass(type) {
      return { login:'event-login', login_failed:'event-revoke', logout:'event-logout',
               admin_action:'event-admin', session_revoke:'event-revoke',
               token_refresh:'event-token' }[type] || 'event-default';
    }

    function statusTag(e) {
      if (e.success) return { label: 'Success', type: 'success' };
      if (e.type === 'login_failed') return { label: 'Failed', type: 'danger' };
      return { label: 'Info', type: 'info' };
    }

    function csvCell(val) {
      const s = String(val ?? '');
      // Prevent formula injection (CWE-1236): prefix dangerous leading chars.
      const safe = /^[=+\-@\t\r]/.test(s) ? "'" + s : s;
      // Wrap in double-quotes and escape any embedded double-quotes.
      return '"' + safe.replace(/"/g, '""') + '"';
    }

    function exportCSV() {
      const headers = ['Timestamp','User','Event Type','IP Address','Provider','Request ID','Details','Success'];
      const rows = filteredEvents.value.map(e =>
        [e.timestamp, e.user, e.type, e.ip, e.provider||'', e.request_id||'', e.details||'', e.success]
          .map(csvCell).join(','));
      const csv  = [headers.map(csvCell).join(','), ...rows].join('\n');
      const blob = new Blob([csv], { type:'text/csv' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href = url; a.download = 'ezauth-audit-' + new Date().toISOString().slice(0,10) + '.csv';
      a.click(); URL.revokeObjectURL(url);
      ElementPlus.ElMessage({ message:'Audit log exported', type:'success', plain:true });
    }

    onMounted(fetchEvents);
    return { allEvents, filteredEvents, pagedEvents, loading, dateRange, typeFilter, userSearch,
      requestIDSearch, currentPage, pageSize, applyFilters, clearFilters, eventClass, statusTag,
      exportCSV, fmtTime, fetchEvents, portalUser, portalInitials, authPrefix, dbEnabled, showProfile, toggleProfile };
  }
}).use(ElementPlus).mount('#app');
</script>
</body>
</html>
{{end}}
