{{define "admin/users.html"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{if and .AppName (not .HideAppName)}}{{.AppName}} — {{end}}Admin — Users</title>
  <link rel="icon" type="image/svg+xml" href="{{.LogoURL}}">
  <script src="{{.StaticPrefix}}/vendor/vue.global.prod.js"></script>
  <link rel="stylesheet" href="{{.StaticPrefix}}/vendor/element-plus.css" />
  <script src="{{.StaticPrefix}}/vendor/element-plus.full.min.js"></script>
  <link rel="stylesheet" href="{{.StaticPrefix}}/css/all.min.css" />
  <link rel="stylesheet" href="{{.StaticPrefix}}/css/portal.css">
  <script>const AUTH_PREFIX = "{{.AuthPrefix}}"; const CSRF_TOKEN = "{{.CSRFToken}}"; const PORTAL_USER = "{{.Username}}"; const PORTAL_INITIALS = "{{.UserInitials}}"; const PORTAL_DB_ENABLED = {{.DBEnabled}};</script>
  <script src="{{.StaticPrefix}}/scripts/portal.js"></script>
  <style>
    .user-avatar-cell {
      width:32px; height:32px; border-radius:50%;
      background:linear-gradient(135deg,var(--peach) 0%,var(--peach-deep) 100%);
      color:#fff; display:flex; align-items:center; justify-content:center;
      font-size:0.75rem; font-weight:700; flex-shrink:0;
    }
    .user-cell { display:flex; align-items:center; gap:0.625rem; }
    .user-cell-name { font-weight:500; color:var(--text-primary); font-size:0.875rem; }
    .action-btns { display:flex; gap:0.375rem; flex-wrap:nowrap; }
    .info-tags { display:flex; gap:4px; flex-wrap:wrap; }
    .section-label { font-size:0.75rem; font-weight:600; color:var(--text-secondary); margin:1rem 0 0.5rem; }
    .drawer-grid { display:grid; grid-template-columns:1fr 1fr; gap:0.75rem 1rem; }
  </style>
</head>
<body>
<div class="layout">
  {{template "admin/nav.html" .}}
  <div id="app" class="main-area"></div>
</div>

<script type="text/x-template" id="users-tpl">
  <header class="top-header">
    <div class="breadcrumb">
      <span>Admin</span>
      <i class="fa fa-chevron-right"></i>
      <span class="crumb-active">Users</span>
    </div>
    <div class="header-right" style="position:relative;">
      <div class="header-username" v-text="portalUser"></div>
      <div class="header-avatar" @click.stop="toggleProfile" v-text="portalInitials"></div>
      <div v-if="showProfile" class="profile-popover" @click.stop>
        <div class="profile-popover-user">
          <div class="profile-popover-avatar" v-text="portalInitials"></div>
          <div class="profile-popover-info">
            <div class="profile-popover-name" v-text="portalUser || '—'"></div>
          </div>
        </div>
        <div class="profile-popover-actions">
          <a :href="authPrefix + '/portal/profile'" class="profile-popover-action">
            <i class="fa fa-user"></i> My Profile
          </a>
          <a v-if="dbEnabled" :href="authPrefix + '/portal/tokens'" class="profile-popover-action">
            <i class="fa fa-key"></i> Access Tokens
          </a>
          <a :href="authPrefix + '/logout'" class="profile-popover-action danger">
            <i class="fa fa-right-from-bracket"></i> Sign out
          </a>
        </div>
      </div>
    </div>
  </header>

  <main class="page-content">
    <div class="page-header-row">
      <div class="page-heading">
        <h1>User Management</h1>
        <p>Manage user accounts, roles, and access.</p>
      </div>
      <el-button class="btn-primary" size="default" @click="openAddDialog">
        <i class="fa fa-plus" style="margin-right:6px;"></i>Add User
      </el-button>
    </div>

    <div class="filter-row">
      <el-input v-model="searchQuery" placeholder="Search by name or email" clearable
        @input="applyFilters" style="width:240px;" />
      <el-select v-model="groupFilter" placeholder="All Groups" clearable
        @change="applyFilters" style="width:160px;">
        <el-option label="All Groups" value="" />
        <el-option v-for="g in availableGroups" :key="g" :label="g" :value="g" />
      </el-select>
      <el-select v-model="statusFilter" placeholder="All Statuses" clearable
        @change="applyFilters" style="width:160px;">
        <el-option label="All Statuses" value="" />
        <el-option label="Active"       value="active" />
        <el-option label="Disabled"     value="disabled" />
      </el-select>
      <el-button circle @click="fetchUsers" :loading="loading">
        <i class="fa fa-rotate-right"></i>
      </el-button>
    </div>

    <div class="section-card" v-loading="loading">
      <el-table :data="pagedUsers" style="width:100%;cursor:pointer;" table-layout="auto"
        @row-click="openMetaDrawer">
        <el-table-column label="User" min-width="150">
          <template #default="scope">
            <div class="user-cell">
              <div class="user-avatar-cell" v-text="initials(scope.row.username)"></div>
              <span class="user-cell-name" v-text="scope.row.username"></span>
            </div>
          </template>
        </el-table-column>
        <el-table-column prop="email"         label="Email"      min-width="170" show-overflow-tooltip />
        <el-table-column prop="first_name"    label="First Name" min-width="100" show-overflow-tooltip />
        <el-table-column prop="last_name"     label="Last Name"  min-width="100" show-overflow-tooltip />
        <el-table-column prop="mobile_number" label="Mobile"     min-width="120" show-overflow-tooltip />
        <el-table-column prop="country"       label="Country"    min-width="90"  show-overflow-tooltip />
        <el-table-column prop="lastLoginDisplay" label="Last Login" min-width="150" show-overflow-tooltip />
        <el-table-column label="Status" width="100">
          <template #default="scope">
            <el-tag
              :type="scope.row.active ? 'success' : 'info'"
              v-text="scope.row.active ? 'Active' : 'Disabled'"
              size="small"
              style="border-radius:6px;font-weight:500;"
            />
          </template>
        </el-table-column>
        <el-table-column label="Actions" width="120" fixed="right">
          <template #default="scope">
            <div class="action-btns">
              <el-tooltip content="Edit" placement="top">
                <el-button size="small" @click.stop="openEditDialog(scope.row)">
                  <i class="fa fa-pen"></i>
                </el-button>
              </el-tooltip>
              <el-tooltip content="Reset Password" placement="top">
                <el-button size="small" type="warning" @click.stop="openPwdDialog(scope.row)">
                  <i class="fa fa-key"></i>
                </el-button>
              </el-tooltip>
              <el-tooltip content="Delete" placement="top">
                <el-button size="small" type="danger" @click.stop="deleteUser(scope.row)">
                  <i class="fa fa-trash"></i>
                </el-button>
              </el-tooltip>
            </div>
          </template>
        </el-table-column>
      </el-table>

      <div class="pagination-row">
        <el-pagination
          v-model:current-page="currentPage"
          v-model:page-size="pageSize"
          :page-sizes="[10, 20, 50, 100]"
          :total="filteredUsers.length"
          layout="total, sizes, prev, pager, next"
          @size-change="applyFilters"
          @current-change="handlePageChange"
        />
      </div>
    </div>

    <!-- ── Add User Dialog ── -->
    <el-dialog v-model="showAddDialog" title="Add New User" width="560px" @closed="resetAddForm">
      <el-form :model="addForm" label-width="120px" style="padding-right:1rem;padding-top:1rem;">
        <el-form-item label="Username *">
          <el-input v-model="addForm.username" placeholder="e.g. alice" autocomplete="off" />
        </el-form-item>
        <el-form-item label="Password *">
          <el-input v-model="addForm.password" type="password" show-password
            placeholder="At least 8 characters" autocomplete="new-password" />
        </el-form-item>
        <el-form-item label="Email">
          <el-input v-model="addForm.email" placeholder="alice@example.com" />
        </el-form-item>
        <el-form-item label="First Name">
          <el-input v-model="addForm.firstName" placeholder="Alice" />
        </el-form-item>
        <el-form-item label="Last Name">
          <el-input v-model="addForm.lastName" placeholder="Smith" />
        </el-form-item>
        <el-form-item label="Mobile">
          <el-input v-model="addForm.mobileNumber" placeholder="+1 555 0100" />
        </el-form-item>
        <el-form-item label="Birth Date">
          <el-date-picker v-model="addForm.birthDate" type="date" placeholder="YYYY-MM-DD"
            format="YYYY-MM-DD" value-format="YYYY-MM-DD" style="width:100%;" />
        </el-form-item>
        <el-form-item label="Street">
          <el-input v-model="addForm.street" placeholder="123 Main St" />
        </el-form-item>
        <el-form-item label="City">
          <el-input v-model="addForm.city" placeholder="Springfield" />
        </el-form-item>
        <el-form-item label="State">
          <el-input v-model="addForm.state" placeholder="IL" />
        </el-form-item>
        <el-form-item label="Zip Code">
          <el-input v-model="addForm.zipCode" placeholder="62701" />
        </el-form-item>
        <el-form-item label="Country">
          <el-select v-model="addForm.country" placeholder="Select country" filterable style="width:100%;">
            <el-option v-for="c in countryOptions" :key="c.code" :label="c.label" :value="c.code" />
          </el-select>
        </el-form-item>
      </el-form>
      <template #footer>
        <div class="dialog-footer">
          <el-button @click="showAddDialog = false">Cancel</el-button>
          <el-button type="primary" @click="submitAddUser" :loading="saving">Create User</el-button>
        </div>
      </template>
    </el-dialog>

    <!-- ── Edit User Dialog ── -->
    <el-dialog v-model="showEditDialog" title="Edit User" width="560px" @closed="resetEditForm">
      <div v-if="editLoading" style="text-align:center;padding:2rem;">
        <i class="fa fa-spinner fa-spin"></i>
      </div>
      <el-form v-else :model="editForm" label-width="120px" style="padding-right:1rem;padding-top:1rem;">
        <el-form-item label="Username">
          <el-input v-model="editForm.username" />
        </el-form-item>
        <el-form-item label="Email">
          <el-input v-model="editForm.email" />
        </el-form-item>
        <el-form-item label="First Name">
          <el-input v-model="editForm.firstName" />
        </el-form-item>
        <el-form-item label="Last Name">
          <el-input v-model="editForm.lastName" />
        </el-form-item>
        <el-form-item label="Mobile">
          <el-input v-model="editForm.mobileNumber" />
        </el-form-item>
        <el-form-item label="Birth Date">
          <el-date-picker v-model="editForm.birthDate" type="date" placeholder="YYYY-MM-DD"
            format="YYYY-MM-DD" value-format="YYYY-MM-DD" style="width:100%;" />
        </el-form-item>
        <el-form-item label="Street">
          <el-input v-model="editForm.street" />
        </el-form-item>
        <el-form-item label="City">
          <el-input v-model="editForm.city" />
        </el-form-item>
        <el-form-item label="State">
          <el-input v-model="editForm.state" />
        </el-form-item>
        <el-form-item label="Zip Code">
          <el-input v-model="editForm.zipCode" />
        </el-form-item>
        <el-form-item label="Country">
          <el-select v-model="editForm.country" placeholder="Select country" filterable style="width:100%;">
            <el-option v-for="c in countryOptions" :key="c.code" :label="c.label" :value="c.code" />
          </el-select>
        </el-form-item>
        <el-form-item label="Groups">
          <el-select v-model="editForm.groups" multiple filterable placeholder="Assign groups"
            style="width:100%;" :loading="editMetaLoading">
            <el-option v-for="g in allGroupNames" :key="g" :label="g" :value="g" />
          </el-select>
        </el-form-item>
        <el-form-item label="Roles" v-if="rbacEnabled">
          <el-select v-model="editForm.roles" multiple filterable placeholder="Assign roles"
            style="width:100%;" :loading="editMetaLoading">
            <el-option v-for="r in allRoleNames" :key="r" :label="r" :value="r" />
          </el-select>
        </el-form-item>

      </el-form>
      <template #footer>
        <div class="dialog-footer">
          <el-button @click="showEditDialog = false">Cancel</el-button>
          <el-button type="primary" @click="submitEditUser" :loading="saving">Save Changes</el-button>
        </div>
      </template>
    </el-dialog>

    <!-- ── User Detail Drawer ── -->
    <el-drawer v-model="showMetaDrawer" direction="rtl" size="380px" :with-header="true">
      <template #header>
        <div style="display:flex;align-items:center;gap:0.75rem;">
          <div class="user-avatar-cell" v-text="initials(userMeta.username)"
            style="flex-shrink:0;width:42px;height:42px;font-size:0.9rem;"></div>
          <div>
            <div style="font-weight:600;font-size:1rem;color:var(--text-primary);" v-text="userMeta.username"></div>
            <div style="font-size:0.78rem;color:var(--text-secondary);" v-text="userMeta.email"></div>
          </div>
          <el-tag :type="userMeta.active ? 'success' : 'info'" size="small"
            v-text="userMeta.active ? 'Active' : 'Disabled'"
            style="margin-left:auto;border-radius:6px;font-weight:500;" />
        </div>
      </template>

      <div v-if="metaLoading" style="text-align:center;padding:3rem;">
        <i class="fa fa-spinner fa-spin fa-2x" style="color:var(--peach);"></i>
      </div>
      <div v-else style="padding:0 0.25rem;">

        <!-- Profile -->
        <div class="drawer-section-label">PROFILE</div>
        <div class="drawer-grid">
          <div class="drawer-field">
            <span class="drawer-field-label">First Name</span>
            <span class="drawer-field-value" v-text="userMeta.firstName || '—'"></span>
          </div>
          <div class="drawer-field">
            <span class="drawer-field-label">Last Name</span>
            <span class="drawer-field-value" v-text="userMeta.lastName || '—'"></span>
          </div>
          <div class="drawer-field">
            <span class="drawer-field-label">Mobile</span>
            <span class="drawer-field-value" v-text="userMeta.mobile || '—'"></span>
          </div>
          <div class="drawer-field">
            <span class="drawer-field-label">Birth Date</span>
            <span class="drawer-field-value" v-text="userMeta.birthDate || '—'"></span>
          </div>
        </div>

        <!-- Address -->
        <div class="drawer-section-label" style="margin-top:1.25rem;">ADDRESS</div>
        <div class="drawer-grid">
          <div class="drawer-field" style="grid-column:1/-1;">
            <span class="drawer-field-label">Street</span>
            <span class="drawer-field-value" v-text="userMeta.street || '—'"></span>
          </div>
          <div class="drawer-field">
            <span class="drawer-field-label">City</span>
            <span class="drawer-field-value" v-text="userMeta.city || '—'"></span>
          </div>
          <div class="drawer-field">
            <span class="drawer-field-label">State</span>
            <span class="drawer-field-value" v-text="userMeta.state || '—'"></span>
          </div>
          <div class="drawer-field">
            <span class="drawer-field-label">Zip Code</span>
            <span class="drawer-field-value" v-text="userMeta.zipCode || '—'"></span>
          </div>
          <div class="drawer-field">
            <span class="drawer-field-label">Country</span>
            <span class="drawer-field-value" v-text="userMeta.country || '—'"></span>
          </div>
        </div>

        <!-- Activity -->
        <div class="drawer-section-label" style="margin-top:1.25rem;">ACTIVITY</div>
        <div class="drawer-grid">
          <div class="drawer-field" style="grid-column:1/-1;">
            <span class="drawer-field-label">Last Login</span>
            <span class="drawer-field-value" v-text="userMeta.lastLogin"></span>
          </div>
          <div class="drawer-field">
            <span class="drawer-field-label">Created</span>
            <span class="drawer-field-value" v-text="userMeta.createdAt"></span>
          </div>
          <div class="drawer-field">
            <span class="drawer-field-label">Updated</span>
            <span class="drawer-field-value" v-text="userMeta.updatedAt"></span>
          </div>
        </div>

        <!-- Roles -->
        <div class="drawer-section-label" style="margin-top:1.25rem;">ROLES</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px;min-height:24px;">
          <el-tag v-for="r in userMeta.roles" :key="r" v-text="r" style="border-radius:6px;" />
          <span v-if="!userMeta.roles.length" style="font-size:0.85rem;color:var(--text-secondary);">No roles assigned</span>
        </div>

        <!-- Groups -->
        <div class="drawer-section-label" style="margin-top:1.25rem;">GROUPS</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px;min-height:24px;">
          <el-tag v-for="g in userMeta.groups" :key="g" v-text="g" style="border-radius:6px;" />
          <span v-if="!userMeta.groups.length" style="font-size:0.85rem;color:var(--text-secondary);">No groups assigned</span>
        </div>

      </div>
    </el-drawer>

    <!-- ── Reset Password Dialog ── -->
    <el-dialog v-model="showPwdDialog" title="Reset Password" width="420px" @closed="resetPwdForm">
      <el-form :model="pwdForm" label-width="130px" style="padding:1rem 1rem 0;">
        <el-form-item label="Username">
          <span v-text="pwdForm.username" style="color:var(--text-secondary);font-size:0.875rem;"></span>
        </el-form-item>
        <el-form-item label="New Password *">
          <el-input v-model="pwdForm.newPassword" type="password" show-password
            placeholder="At least 8 characters" autocomplete="new-password" />
        </el-form-item>
      </el-form>
      <template #footer>
        <div class="dialog-footer">
          <el-button @click="showPwdDialog = false">Cancel</el-button>
          <el-button type="warning" @click="submitResetPassword" :loading="savingPwd"
            :disabled="!pwdForm.newPassword">Reset Password</el-button>
        </div>
      </template>
    </el-dialog>

  </main>
</script>

<script>
const { createApp, ref, computed, onMounted } = Vue;

createApp({
  template: '#users-tpl',
  setup() {
    // ── state ──
    const portalUser     = ref(PORTAL_USER);
    const portalInitials = ref(PORTAL_INITIALS);
    const authPrefix     = ref(AUTH_PREFIX);
    const dbEnabled      = PORTAL_DB_ENABLED;
    const { showProfile, toggleProfile } = useProfile();

    const allUsers     = ref([]);
    const loading      = ref(false);
    const saving       = ref(false);
    const savingPwd    = ref(false);
    const editLoading  = ref(false);
    const editMetaLoading = ref(false);

    const searchQuery  = ref('');
    const groupFilter  = ref('');
    const statusFilter = ref('');
    const currentPage  = ref(1);
    const pageSize     = ref(10);

    const availableGroups = ref([]);
    const allGroupNames   = ref([]);
    const allRoleNames    = ref([]);
    const rbacEnabled     = ref(false);

    const showAddDialog  = ref(false);
    const showEditDialog = ref(false);
    const showPwdDialog  = ref(false);
    const pwdForm        = ref({ id:'', username:'', newPassword:'' });

    const metaLoading    = ref(false);
    const showMetaDrawer = ref(false);
    const emptyMeta = () => ({
      username:'', email:'', active:false,
      firstName:'', lastName:'', mobile:'', birthDate:'',
      street:'', city:'', state:'', zipCode:'', country:'',
      lastLogin:'—', createdAt:'—', updatedAt:'—',
      roles:[], groups:[],
    });
    const userMeta = ref(emptyMeta());

    async function openMetaDrawer(row) {
      showMetaDrawer.value = true;
      userMeta.value = { ...emptyMeta(), username: row.username, email: row.email || '', active: row.active };
      metaLoading.value = true;
      try {
        const resp = await fetch(AUTH_PREFIX + '/users/' + row.id);
        if (!resp.ok) throw new Error('failed');
        const body = await resp.json();
        const u = body.data;
        const addr = u.address || {};
        const bd   = u.birth_date && !u.birth_date.startsWith('0001-') ? u.birth_date.slice(0,10) : '';
        userMeta.value = {
          username:  u.username,
          email:     u.email || '',
          active:    u.active,
          firstName: u.first_name  || '',
          lastName:  u.last_name   || '',
          mobile:    u.mobile_number || '',
          birthDate: bd,
          street:    addr.street   || '',
          city:      addr.city     || '',
          state:     addr.state    || '',
          zipCode:   addr.zip_code || '',
          country:   addr.country  || '',
          lastLogin: fmtTime(u.last_login),
          createdAt: fmtTime(u.created_at),
          updatedAt: fmtTime(u.updated_at),
          roles:     u.roles  || [],
          groups:    u.groups || [],
        };
      } catch(_) {} finally {
        metaLoading.value = false;
      }
    }

    const emptyAdd  = () => ({ username:'', password:'', email:'', firstName:'', lastName:'', mobileNumber:'', birthDate:'', street:'', city:'', state:'', zipCode:'', country:'' });
    const emptyEdit = () => ({ id:'', username:'', email:'', firstName:'', lastName:'', mobileNumber:'', birthDate:'', street:'', city:'', state:'', zipCode:'', country:'', groups:[], roles:[], origGroups:[], origRoles:[] });
    const addForm  = ref(emptyAdd());
    const editForm = ref(emptyEdit());

    // ── fetch users ──
    async function fetchUsers() {
      loading.value = true;
      try {
        const resp = await fetch(AUTH_PREFIX + '/users/?limit=100');
        if (!resp.ok) throw new Error('Failed to load users (HTTP ' + resp.status + ')');
        const body = await resp.json();
        const data = body.data;
        allUsers.value = (data || []).map(u => ({
          ...u,
          lastLoginDisplay: fmtTime(u.last_login),
        }));
      } catch(e) {
        ElementPlus.ElMessage({ message: e.message, type:'error', plain:true });
      } finally {
        loading.value = false;
      }
    }

    // ── fetch groups for filter dropdown and edit select ──
    async function fetchGroups() {
      try {
        const resp = await fetch(AUTH_PREFIX + '/groups/?limit=500');
        if (!resp.ok) return;
        const body = await resp.json();
        const data = body.data;
        const names = (data.items || []).map(g => g.name);
        availableGroups.value = names;
        allGroupNames.value   = names;
      } catch(_) {}
    }

    // ── fetch all roles for edit select ──
    async function fetchAllRoles() {
      try {
        const resp = await fetch(AUTH_PREFIX + '/auth/role/?limit=500');
        if (!resp.ok) return;
        const body = await resp.json();
        allRoleNames.value = (body.data.roles || []);
        rbacEnabled.value  = true;
      } catch(_) { rbacEnabled.value = false; }
    }

    // ── filtering + pagination ──
    const filteredUsers = computed(() => allUsers.value.filter(u => {
      const q = searchQuery.value.toLowerCase();
      const matchQ = !q || u.username.toLowerCase().includes(q) || (u.email||'').toLowerCase().includes(q);
      const matchStatus = !statusFilter.value ||
        (statusFilter.value === 'active' && u.active) ||
        (statusFilter.value === 'disabled' && !u.active);
      const matchGroup = !groupFilter.value || (u.groups || []).includes(groupFilter.value);
      return matchQ && matchStatus && matchGroup;
    }));

    const pagedUsers = computed(() => {
      const s = (currentPage.value - 1) * pageSize.value;
      return filteredUsers.value.slice(s, s + pageSize.value);
    });

    function applyFilters()      { currentPage.value = 1; }
    function handlePageChange(p) { currentPage.value = p; }

    // ── add user ──
    function openAddDialog() {
      resetAddForm();
      showAddDialog.value = true;
    }
    function resetAddForm() { addForm.value = emptyAdd(); }

    async function submitAddUser() {
      if (!addForm.value.username) {
        ElementPlus.ElMessage({ message:'Username is required', type:'warning', plain:true }); return;
      }
      if (!addForm.value.password) {
        ElementPlus.ElMessage({ message:'Password is required', type:'warning', plain:true }); return;
      }
      saving.value = true;
      try {
        const resp = await fetch(AUTH_PREFIX + '/users/', {
          method: 'POST',
          headers: jsonHeaders(),
          body: JSON.stringify({
            username:      addForm.value.username,
            password:      addForm.value.password,
            email:         addForm.value.email,
            first_name:    addForm.value.firstName,
            last_name:     addForm.value.lastName,
            mobile_number: addForm.value.mobileNumber,
            birth_date:    addForm.value.birthDate ? addForm.value.birthDate + 'T00:00:00Z' : undefined,
            address: {
              street:   addForm.value.street,
              city:     addForm.value.city,
              state:    addForm.value.state,
              zip_code: addForm.value.zipCode,
              country:  addForm.value.country,
            },
          }),
        });
        if (!resp.ok) {
          const msg = await apiError(resp, 'Failed to create user');
          ElementPlus.ElMessage({ message: msg, type:'error', plain:true }); return;
        }
        showAddDialog.value = false;
        ElementPlus.ElMessage({ message:'User created', type:'success', plain:true });
        fetchUsers();
      } catch(e) {
        ElementPlus.ElMessage({ message: e.message, type:'error', plain:true });
      } finally {
        saving.value = false;
      }
    }

    // ── edit user ──
    async function openEditDialog(user) {
      resetEditForm();
      showEditDialog.value = true;
      editLoading.value = true;
      try {
        const resp = await fetch(AUTH_PREFIX + '/users/' + user.id);
        if (!resp.ok) throw new Error('Failed to load user details');
        const body = await resp.json();
        const u = body.data;
        const addr   = u.address || {};
        const bd     = u.birth_date && !u.birth_date.startsWith('0001-') ? u.birth_date.slice(0,10) : '';
        const groups = u.groups || [];
        const roles  = u.roles  || [];
        editForm.value = {
          id:           u.id,
          username:     u.username,
          email:        u.email || '',
          firstName:    u.first_name || '',
          lastName:     u.last_name || '',
          mobileNumber: u.mobile_number || '',
          birthDate:    bd,
          street:       addr.street   || '',
          city:         addr.city     || '',
          state:        addr.state    || '',
          zipCode:      addr.zip_code || '',
          country:      addr.country  || '',
          groups:       [...groups],
          roles:        [...roles],
          origGroups:   [...groups],
          origRoles:    [...roles],
        };
      } catch(e) {
        ElementPlus.ElMessage({ message: e.message, type:'error', plain:true });
        showEditDialog.value = false;
      } finally {
        editLoading.value = false;
      }
    }

    function resetEditForm() { editForm.value = emptyEdit(); }

    async function submitEditUser() {
      saving.value = true;
      try {
        // 1. Update profile fields
        const resp = await fetch(AUTH_PREFIX + '/users/', {
          method: 'PUT',
          headers: jsonHeaders(),
          body: JSON.stringify({
            id:            editForm.value.id,
            username:      editForm.value.username,
            email:         editForm.value.email,
            first_name:    editForm.value.firstName,
            last_name:     editForm.value.lastName,
            mobile_number: editForm.value.mobileNumber,
            address: {
              street:   editForm.value.street,
              city:     editForm.value.city,
              state:    editForm.value.state,
              zip_code: editForm.value.zipCode,
              country:  editForm.value.country,
            },
          }),
        });
        if (!resp.ok) {
          const msg = await apiError(resp, 'Failed to update user');
          ElementPlus.ElMessage({ message: msg, type:'error', plain:true }); return;
        }

        // 2. Sync group membership
        const addGroups    = editForm.value.groups.filter(g => !editForm.value.origGroups.includes(g));
        const removeGroups = editForm.value.origGroups.filter(g => !editForm.value.groups.includes(g));
        for (const g of addGroups) {
          await fetch(AUTH_PREFIX + '/groups/' + g + '/members/assign', {
            method: 'POST', headers: jsonHeaders(),
            body: JSON.stringify({ users: [editForm.value.id] }),
          });
        }
        for (const g of removeGroups) {
          await fetch(AUTH_PREFIX + '/groups/' + g + '/members/unassign', {
            method: 'DELETE', headers: jsonHeaders(),
            body: JSON.stringify({ users: [editForm.value.id] }),
          });
        }

        // 3. Sync role assignments (only if RBAC enabled)
        if (rbacEnabled.value) {
          const addRoles    = editForm.value.roles.filter(r => !editForm.value.origRoles.includes(r));
          const removeRoles = editForm.value.origRoles.filter(r => !editForm.value.roles.includes(r));
          if (addRoles.length) {
            await fetch(AUTH_PREFIX + '/users/' + editForm.value.id + '/roles/assign', {
              method: 'POST', headers: jsonHeaders(),
              body: JSON.stringify({ roles: addRoles }),
            });
          }
          if (removeRoles.length) {
            await fetch(AUTH_PREFIX + '/users/' + editForm.value.id + '/roles/unassign', {
              method: 'DELETE', headers: jsonHeaders(),
              body: JSON.stringify({ roles: removeRoles }),
            });
          }
        }

        showEditDialog.value = false;
        ElementPlus.ElMessage({ message:'User updated', type:'success', plain:true });
        fetchUsers();
      } catch(e) {
        ElementPlus.ElMessage({ message: e.message, type:'error', plain:true });
      } finally {
        saving.value = false;
      }
    }

    function openPwdDialog(user) {
      pwdForm.value = { id: user.id, username: user.username, newPassword: '' };
      showPwdDialog.value = true;
    }
    function resetPwdForm() {
      pwdForm.value = { id:'', username:'', newPassword:'' };
    }
    async function submitResetPassword() {
      if (!pwdForm.value.newPassword) return;
      savingPwd.value = true;
      try {
        const resp = await fetch(AUTH_PREFIX + '/users/' + pwdForm.value.id + '/reset-password', {
          method: 'PUT',
          headers: jsonHeaders(),
          body: JSON.stringify({ password: pwdForm.value.newPassword }),
        });
        if (!resp.ok) {
          const msg = await apiError(resp, 'Failed to reset password');
          ElementPlus.ElMessage({ message: msg, type:'error', plain:true }); return;
        }
        showPwdDialog.value = false;
        ElementPlus.ElMessage({ message:'Password reset successfully', type:'success', plain:true });
      } catch(e) {
        ElementPlus.ElMessage({ message: e.message, type:'error', plain:true });
      } finally {
        savingPwd.value = false;
      }
    }

    // ── delete user ──
    async function deleteUser(user) {
      try {
        await ElementPlus.ElMessageBox.confirm(
          'Delete user "' + user.username + '"? This action cannot be undone.',
          'Confirm Delete',
          { confirmButtonText:'Delete', cancelButtonText:'Cancel', type:'warning' }
        );
      } catch(_) { return; }

      try {
        const resp = await fetch(AUTH_PREFIX + '/users/', {
          method: 'DELETE',
          headers: jsonHeaders(),
          body: JSON.stringify({ id: user.id }),
        });
        if (!resp.ok) {
          const msg = await apiError(resp, 'Failed to delete user');
          ElementPlus.ElMessage({ message: msg, type:'error', plain:true }); return;
        }
        ElementPlus.ElMessage({ message:'User deleted', type:'success', plain:true });
        fetchUsers();
      } catch(e) {
        ElementPlus.ElMessage({ message: e.message, type:'error', plain:true });
      }
    }

    onMounted(() => {
      fetchUsers();
      fetchGroups();
      fetchAllRoles();
    });

    return {
      countryOptions,
      portalUser, portalInitials, authPrefix, dbEnabled, showProfile, toggleProfile,
      allUsers, filteredUsers, pagedUsers,
      loading, saving, savingPwd, editLoading, editMetaLoading,
      searchQuery, groupFilter, statusFilter, availableGroups,
      allGroupNames, allRoleNames, rbacEnabled,
      currentPage, pageSize,
      showAddDialog, showEditDialog, showPwdDialog,
      addForm, editForm, pwdForm,
      metaLoading, showMetaDrawer, userMeta, openMetaDrawer,
      applyFilters, handlePageChange, initials, fetchUsers,
      openAddDialog, resetAddForm, submitAddUser,
      openEditDialog, resetEditForm, submitEditUser,
      openPwdDialog, resetPwdForm, submitResetPassword,
      deleteUser,
    };
  }
}).use(ElementPlus).mount('#app');
</script>
</body>
</html>
